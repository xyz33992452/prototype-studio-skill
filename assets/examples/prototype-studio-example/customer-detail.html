<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>客户详情示例原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./shared/requirements-ui.css" />
    <link rel="stylesheet" href="./customer-detail.css" />
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div id="page-customer-detail" class="min-h-screen">
      <header class="border-b border-white/10 bg-slate-950/95 backdrop-blur">
        <div class="mx-auto max-w-7xl px-6 py-5">
          <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
            <div>
              <a id="customer-detail-back-link" class="text-sm text-cyan-300 hover:text-cyan-200" href="./customer-list.html">返回客户列表</a>
              <h1 id="customer-detail-name" class="mt-3 text-3xl font-semibold text-white">示例客户</h1>
              <div class="mt-3 flex flex-wrap items-center gap-3 text-sm text-slate-300">
                <span id="customer-detail-status" class="rounded-full bg-emerald-500/15 px-3 py-1 text-emerald-300">活跃客户</span>
                <span id="customer-detail-id">客户编号：-</span>
                <span id="customer-detail-owner">负责人：--</span>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <button id="customer-detail-edit-button" data-role-visibility="manager" class="rounded-full border border-white/15 px-4 py-2 text-sm text-slate-200 hover:bg-white/5">编辑信息</button>
              <button class="rounded-full bg-cyan-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-cyan-400">发起商机</button>
            </div>
          </div>
          <nav id="customer-detail-shared-nav" class="mt-4"></nav>
        </div>
      </header>

      <main class="mx-auto grid max-w-7xl gap-6 px-6 py-8 xl:grid-cols-[1.5fr_0.9fr]">
        <section class="space-y-6">
          <article class="rounded-[2rem] border border-white/10 bg-white/[0.04] p-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-400">客户概览</p>
                <h2 class="mt-3 text-2xl font-semibold text-white">核心经营信息</h2>
              </div>
              <span class="rounded-full bg-cyan-500/15 px-3 py-1 text-sm text-cyan-200">本季度重点客户</span>
            </div>

            <div class="mt-6 grid gap-4 md:grid-cols-3">
              <article class="rounded-3xl border border-white/10 bg-black/10 p-5">
                <p class="text-sm text-slate-400">累计合同额</p>
                <p id="customer-detail-contract" class="mt-3 text-3xl font-semibold text-white">¥0</p>
              </article>
              <article class="rounded-3xl border border-white/10 bg-black/10 p-5">
                <p class="text-sm text-slate-400">最近跟进</p>
                <p id="customer-detail-followup" class="mt-3 text-3xl font-semibold text-white">--</p>
              </article>
              <article class="rounded-3xl border border-white/10 bg-black/10 p-5">
                <p class="text-sm text-slate-400">续约概率</p>
                <p id="customer-detail-renewal" class="mt-3 text-3xl font-semibold text-white">--</p>
              </article>
            </div>
          </article>

          <article class="rounded-[2rem] border border-white/10 bg-white/[0.04] p-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-400">业务背景</p>
                <h2 class="mt-3 text-2xl font-semibold text-white">业务信息</h2>
              </div>
              <button class="rounded-full border border-white/15 px-4 py-2 text-sm text-slate-200 hover:bg-white/5">编辑业务标签</button>
            </div>

            <div class="mt-6 grid gap-4 md:grid-cols-2">
              <div class="rounded-3xl border border-white/10 bg-black/10 p-5">
                <p class="text-sm text-slate-400">所属行业</p>
                <p id="customer-detail-industry" class="mt-2 text-lg font-medium text-white">--</p>
              </div>
              <div class="rounded-3xl border border-white/10 bg-black/10 p-5">
                <p class="text-sm text-slate-400">当前阶段</p>
                <p id="customer-detail-stage" class="mt-2 text-lg font-medium text-white">--</p>
              </div>
              <div class="rounded-3xl border border-white/10 bg-black/10 p-5">
                <p class="text-sm text-slate-400">核心诉求</p>
                <p id="customer-detail-need" class="mt-2 text-lg font-medium text-white">--</p>
              </div>
              <div class="rounded-3xl border border-white/10 bg-black/10 p-5">
                <p class="text-sm text-slate-400">最近风险</p>
                <p id="customer-detail-risk" class="mt-2 text-lg font-medium text-white">--</p>
              </div>
            </div>
          </article>
        </section>

        <aside class="space-y-6">
          <article class="rounded-[2rem] border border-white/10 bg-white/[0.04] p-6">
            <p class="text-xs uppercase tracking-[0.3em] text-slate-400">关键联系人</p>
            <h2 class="mt-3 text-2xl font-semibold text-white">联系人信息</h2>
            <div id="customer-detail-contacts" class="mt-5 space-y-3"></div>
          </article>

          <article class="rounded-[2rem] border border-white/10 bg-white/[0.04] p-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-400">跟进时间线</p>
                <h2 class="mt-3 text-2xl font-semibold text-white">沟通记录</h2>
              </div>
              <button class="rounded-full border border-white/15 px-4 py-2 text-sm text-slate-200 hover:bg-white/5">新增记录</button>
            </div>
            <div id="customer-detail-timeline" class="mt-5 space-y-4"></div>
          </article>
        </aside>
      </main>
    </div>

    <div id="requirements-overlay-root"></div>
    <div id="dialog-root"></div>

    <script src="./shared/navigation-config.js"></script>
    <script src="./shared/navigation-ui.js"></script>
    <script src="./shared/customer-data.js"></script>
    <script src="./shared/requirements-data.js"></script>
    <script src="./shared/requirements-ui.js"></script>
    <script src="./customer-detail.js"></script>
  </body>
</html>
