<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM 示例原型入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto flex min-h-screen max-w-6xl flex-col justify-center gap-10 px-6 py-12">
      <section class="max-w-3xl">
        <p class="text-xs uppercase tracking-[0.35em] text-cyan-300">Prototype Studio Example</p>
        <h1 class="mt-4 text-4xl font-semibold text-white md:text-5xl">CRM 多页面原型示例</h1>
        <p class="mt-6 text-lg leading-8 text-slate-300">
          这是一套用于演示 `prototype-studio` 的安全示例原型。页面采用独立 HTML 文件组织，共享统一导航配置、共享示例数据和共享需求文档面板。
        </p>
      </section>

      <section class="grid gap-6 md:grid-cols-2">
        <a href="./customer-list.html?role=viewer" class="rounded-[2rem] border border-white/10 bg-white/[0.04] p-6 transition hover:border-cyan-400/50 hover:bg-white/[0.06]">
          <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Viewer</p>
          <h2 class="mt-3 text-2xl font-semibold text-white">客户列表</h2>
          <p class="mt-3 leading-7 text-slate-300">演示筛选、共享导航、需求面板以及从列表跳转到详情页的流程。</p>
          <span class="mt-6 inline-flex rounded-full bg-cyan-400 px-4 py-2 text-sm font-medium text-slate-950">以查看者身份打开</span>
        </a>

        <a href="./customer-detail.html?role=editor&customerId=C-2001" class="rounded-[2rem] border border-white/10 bg-white/[0.04] p-6 transition hover:border-cyan-400/50 hover:bg-white/[0.06]">
          <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Editor</p>
          <h2 class="mt-3 text-2xl font-semibold text-white">客户详情</h2>
          <p class="mt-3 leading-7 text-slate-300">演示当前页高亮、角色权限、详情联动数据和可编辑需求摘要。</p>
          <span class="mt-6 inline-flex rounded-full border border-white/15 px-4 py-2 text-sm font-medium text-white">以编辑者身份打开</span>
        </a>
      </section>
    </main>
  </body>
</html>
